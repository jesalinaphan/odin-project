<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
</head>
<body>
  <img src="#">
  <script>
    const img = document.querySelector('img');
    async function fetchImage() {
        try {
            object = await fetch('https://api.giphy.com/v1/gifs/translate?api_key=Z0gXJv9SGQ3XzLm6HeMGTqFHNOua5Ler&s=cats')
            json = await object.json()
            img.src = json.data.images.original.url;
        } catch (error) {
            console.error(error)
        }
    }
    fetchImage()
  </script>
</body>
</html>
